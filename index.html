<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcore 64 | Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="assets/logo.png" alt="Webcore 64" class="logo">
        <h1>Webcore 64 Library</h1>
    </header>

    <main id="game-grid" class="grid-container">
        <!-- Games will be injected here by JavaScript -->
    </main>

    <script>
        fetch('games.json')
            .then(response => response.json())
            .then(games => {
                const grid = document.getElementById('game-grid');
                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <img src="${game.boxart}" alt="${game.title}">
                        <h3>${game.title}</h3>
                    `;
                    card.onclick = () => {
                        window.location.href = `player.html?game=${encodeURIComponent(game.rom)}`;
                    };
                    grid.appendChild(card);
                });
            });
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>

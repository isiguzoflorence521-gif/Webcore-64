<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcore 64 | Library</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific tweaks for smaller, cleaner cards */
        .grid-container {
            display: grid;
            /* Changed minmax from 180px to 140px for smaller cards */
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .logo-container {
            text-align: center;
            padding: 30px 10px;
        }

        .logo {
            max-width: 220px; /* Controlled logo size */
            height: auto;
        }

        .tagline {
            color: #888;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .game-card h3 {
            font-size: 12px; /* Smaller text for smaller cards */
            padding: 8px;
        }
    </style>
</head>
<body>

    <header class="logo-container">
        <!-- Your Google Drawings Logo -->
        <img src="assets/logo.png" alt="Webcore 64" class="logo">
        <div class="tagline">Classic Power, Modern Web</div>
    </header>

    <main id="game-grid" class="grid-container">
        <!-- Games inject here -->
    </main>

    <script>
        // Service Worker for Offline/404
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        fetch('games.json')
            .then(res => res.json())
            .then(games => {
                const grid = document.getElementById('game-grid');
                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <img src="${game.boxart}" alt="${game.title}">
                        <h3>${game.title}</h3>
                    `;
                    card.onclick = () => {
                        window.location.href = `player.html?game=${encodeURIComponent(game.rom)}`;
                    };
                    grid.appendChild(card);
                });
            })
            .catch(err => console.error("Library Load Error:", err));
    </script>
</body>
</html>

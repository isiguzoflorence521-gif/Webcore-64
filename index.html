<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcore 64 Library</title>
    <style>
        body { background: #111; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; }
        header { padding: 40px 20px; background: #000; }
        
        .main-logo { 
            width: 300px; 
            max-width: 80%; 
            image-rendering: pixelated; 
            margin-bottom: 10px;
        }

        .search-container { margin: 20px; }
        #searchBar { 
            padding: 12px 20px; 
            width: 400px; 
            max-width: 90%; 
            border-radius: 25px; 
            border: 2px solid #333; 
            background: #222; 
            color: #fff;
            outline: none;
            transition: border-color 0.3s;
        }
        #searchBar:focus { border-color: #f00; }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
            padding: 40px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            border: 1px solid #333;
        }
        .game-card:hover { 
            transform: translateY(-10px); 
            background: #252525; 
            border-color: #f00;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .game-card img { 
            width: 100%; 
            aspect-ratio: 3/4; 
            border-radius: 6px; 
            object-fit: cover; 
            background: #000; 
        }
        .game-card p { 
            margin: 15px 0 0; 
            font-weight: bold; 
            font-size: 14px; 
            height: 34px; 
            overflow: hidden; 
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
    </style>
</head>
<body>

    <header>
        <img src="assets/logo.png" alt="Webcore 64" class="main-logo" onerror="this.src='https://placeholder.com'">
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search the library...">
        </div>
    </header>

    <div id="gameGrid" class="game-grid">
        <!-- Games dynamically loaded here -->
    </div>

    <script>
        let allGames = [];
        
        // Fetch the local games.json file
        fetch('games.json')
            .then(res => {
                if (!res.ok) throw new Error("Could not find games.json");
                return res.json();
            })
            .then(data => {
                allGames = data;
                displayGames(allGames);
            })
            .catch(err => console.error("Error loading library:", err));

        function displayGames(games) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = ''; 

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                
                /* 
                   FIX: Changed 'game.file' to 'game.game' 
                   to match your JSON key exactly. 
                */
                card.onclick = () => {
                    window.location.href = `player.html?game=${encodeURIComponent(game.game)}`;
                };
                
                /* 
                   FIX: Changed 'game.image' to 'game.boxart' 
                   to match your JSON key exactly. 
                */
                card.innerHTML = `
                    <img src="${game.boxart}" alt="${game.title}" 
                         onerror="this.src='https://placeholder.com'">
                    <p>${game.title}</p>
                `;
                grid.appendChild(card);
            });
        }

        // Search filtering logic
        document.getElementById('searchBar').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allGames.filter(g => g.title.toLowerCase().includes(term));
            displayGames(filtered);
        });
    </script>
</body>
</html>

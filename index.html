<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcore 64 Library</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; }
        .search-container { margin: 20px; }
        #searchBar { padding: 10px; width: 300px; border-radius: 5px; border: none; }
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px; 
            padding: 20px; 
        }
        .game-card { 
            background: #222; 
            padding: 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: transform 0.2s;
        }
        .game-card:hover { transform: scale(1.05); background: #333; }
        .game-card img { width: 100%; border-radius: 4px; height: 200px; object-fit: cover; }
        .game-card p { margin-top: 10px; font-size: 14px; height: 40px; overflow: hidden; }
    </style>
</head>
<body>

    <h1>🚀 Webcore 64</h1>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search 388+ titles...">
    </div>

    <div id="gameGrid" class="game-grid">
        <!-- Games will be injected here by JavaScript -->
    </div>

    <script>
        let allGames = [];

        // 1. Fetch the games.json file
        fetch('games.json')
            .then(res => res.json())
            .then(data => {
                allGames = data;
                displayGames(allGames);
            })
            .catch(err => console.error("Error loading games.json:", err));

        // 2. Function to display the grid
        function displayGames(games) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = ''; // Clear current list

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                // Clicking a card redirects to player.html with the ROM path
                card.onclick = () => window.location.href = `player.html?game=${encodeURIComponent(game.file)}`;
                
                card.innerHTML = `
                    <img src="${game.image}" alt="${game.title}" onerror="this.src='assets/boxart/placeholder.png'">
                    <p>${game.title}</p>
                `;
                grid.appendChild(card);
            });
        }

        // 3. Search Logic
        document.getElementById('searchBar').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allGames.filter(g => g.title.toLowerCase().includes(term));
            displayGames(filtered);
        });
    </script>
</body>
</html>

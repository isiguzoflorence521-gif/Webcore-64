<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcore 64 | Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="assets/logo.png" alt="Webcore 64" class="logo">
        <h1>Webcore 64</h1>
    </header>

    <main id="game-grid" class="grid-container">
        <!-- Games inject here -->
    </main>

    <script>
        // Register Service Worker for Offline 404 support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Fetch games from database
        fetch('games.json')
            .then(res => {
                if (!res.ok) throw new Error('Could not find games.json');
                return res.json();
            })
            .then(games => {
                const grid = document.getElementById('game-grid');
                grid.innerHTML = ''; // Clear loading state
                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <img src="${game.boxart}" alt="${game.title}">
                        <h3>${game.title}</h3>
                    `;
                    card.onclick = () => {
                        window.location.href = `player.html?game=${encodeURIComponent(game.rom)}`;
                    };
                    grid.appendChild(card);
                });
            })
            .catch(err => {
                console.error('Webcore Error:', err);
                document.getElementById('game-grid').innerHTML = `<p style="color:red">Error loading library. Check console (F12).</p>`;
            });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; }
        #game { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="game"></div>

    <script type="text/javascript">
        // 1. Get the game ID from the URL (e.g., player.html?game=sm64)
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game');

        // 2. Setup EmulatorJS variables
        window.EJS_player = '#game';
        window.EJS_core = 'n64'; 
        window.EJS_pathtodata = 'data/'; // Points to your data/ folder containing loader.js
        window.EJS_gameUrl = `roms/${gameId}.zip`; // Dynamically loads the zip from your roms/ folder
    </script>
    <script src="data/loader.js"></script>
</body>
</html>
>

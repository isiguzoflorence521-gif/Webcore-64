<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <script>
        async function loadGame() {
            // Get the game URL from query parameters
            const params = new URLSearchParams(window.location.search);
            const gameUrl = params.get('gameUrl');

            // Fetch games.json file
            const response = await fetch('games.json');
            const games = await response.json();

            // Find the game title based on the game URL
            const game = games.find(g => g.url === gameUrl);

            if (game) {
                // Display the game title
                document.getElementById('gameTitle').innerText = game.title;
                // Optionally load the game in an iframe or another method
                document.getElementById('gameFrame').src = game.url;
            } else {
                document.getElementById('gameTitle').innerText = 'Game not found';
            }
        }
    </script>
</head>
<body onload="loadGame()">
    <h1 id="gameTitle">Loading...</h1>
    <iframe id="gameFrame" width="800" height="600"></iframe>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Webcore 64 | Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gameUrl = urlParams.get('game');

        async function startWebcore() {
            if (!gameUrl) { window.location.href = 'index.html'; return; }

            try {
                // 1. Fetch ROM as Binary Blob
                const response = await fetch(gameUrl);
                if (!response.ok) throw new Error("ROM not found");
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                // 2. EmulatorJS CDN Configuration
                window.EJS_player = '#game-container';
                window.EJS_core = 'n64'; 
                window.EJS_gameUrl = blobUrl; 
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org';
                window.EJS_settings = typeof webcoreConfig !== 'undefined' ? webcoreConfig : {};

                // 3. Load the Loader from CDN
                const loader = document.createElement('script');
                loader.src = 'https://cdn.emulatorjs.orgloader.js';
                document.body.appendChild(loader);

            } catch (err) {
                console.error("Boot Error:", err);
                window.location.href = '404.html';
            }
        }
        startWebcore();
    </script>
</body>
</html>

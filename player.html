<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Webcore 64 Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="player-body">
    <div id="game-container"></div>
    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gamePath = urlParams.get('game');
        if (gamePath) {
            EJS_player = '#game-container';
            EJS_core = 'n64'; 
            EJS_gameUrl = gamePath;
            EJS_pathtodata = 'data/'; 
            EJS_settings = webcoreConfig; 
        } else {
            window.location.href = 'index.html';
        }
    </script>
    <script src="https://www.emulatorjs.com"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcore 64 | Playing...</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
            transition: opacity 1s ease-in-out;
        }

        /* Simple CSS Spinner instead of GIF */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #back-btn {
            position: absolute;
            top: 10px; left: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
        }
        #back-btn:hover { background: rgba(255, 255, 255, 0.4); }

        #game { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <a href="index.html" id="back-btn">← Library</a>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <div id="game"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const romPath = urlParams.get('game');

        if (!romPath) {
            alert("No ROM selected!");
            window.location.href = 'index.html';
        }

        window.EJS_player = '#game';
        window.EJS_core = 'n64'; 
        window.EJS_gameUrl = romPath;
        window.EJS_pathtodata = 'data/';
        window.EJS_startOnLoaded = true;

        window.EJS_onGameStart = function() {
            const loader = document.getElementById('loading-screen');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 1000);
        };
    </script>

    <script src="data/loader.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>N64 Emulator</title>
    <script src="https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS/dist/emulator.js"></script>
</head>
<body>
    <h1>N64 Emulator</h1>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const romUrl = urlParams.get('game');

        if (romUrl) {
            const blobUrl = URL.createObjectURL(new Blob([new Uint8Array(await (await fetch(romUrl)).arrayBuffer())]));
            const emulator = new Emulator();
            emulator.loadROM(blobUrl);
            emulator.run();
        } else {
            document.body.innerHTML += '<p>No game URL provided. Please add ?game=YOUR_ROM_URL in the URL.</p>';
        }
    </script>
</body>
</html>

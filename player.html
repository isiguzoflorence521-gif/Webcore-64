e<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Webcore 64 Player</title>
    <style>body, html, #game { width: 100%; height: 100%; margin: 0; background: #000; overflow: hidden; }</style>
</head>
<body>
    <div id="game"></div>
    <!-- Load custom performance and key fixes -->
    <script src="config.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const gameSlug = params.get('game');

        window.EJS_player = '#game';
        window.EJS_core = 'n64'; // Uses Mupen64Plus/Parallel
        window.EJS_gameUrl = `roms/${gameSlug}.zip`;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org';
        
        // Path for mods if applicable
        window.EJS_gameParentUrl = 'mods/'; 
    </script>
    <script src="https://cdn.emulatorjs.orgloader.js"></script>
</body>
</html>

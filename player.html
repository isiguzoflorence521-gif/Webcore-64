<!DOCTYPE html>
<html>
<head>
    <title>Webcore 64 | Player</title>
    <style>body,html{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;}#game{width:100vw;height:100vh;}</style>
</head>
<body>
    <div id="game"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const rom = params.get('game');
        if (rom) {
            window.EJS_player = '#game';
            window.EJS_core = 'n64';
            window.EJS_gameUrl = rom;
            // This pulls the "brain" from a professional server so it won't crash
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org';
        } else { window.location.href = 'index.html'; }
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>

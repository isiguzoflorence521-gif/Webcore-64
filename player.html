<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcore 64 | Playing...</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        /* The Loading Screen Overlay */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
            font-family: 'Courier New', monospace;
            transition: opacity 1.5s ease-in-out;
        }

        #loading-screen img {
            width: 250px;
            margin-bottom: 20px;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* The Emulator Container */
        #game {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="https://giphy.com/gifs/n64-video-games-nintendo-ckT59CvStmUsU" alt="N64 Loading">
        <p>POWERING UP WEBCORE 64...</p>
    </div>

    <div id="game"></div>

    <script>
        // 1. Grab the ROM path from the URL (?game=roms/sm64.zip)
        const urlParams = new URLSearchParams(window.location.search);
        const romPath = urlParams.get('game');

        if (!romPath) {
            alert("No ROM selected! Returning to library.");
            window.location.href = 'index.html';
        }

        // 2. Setup Emulator Config
        window.EJS_core = 'n64';
        window.EJS_gameUrl = romPath;
        window.EJS_pathtodata = 'data/';
        window.EJS_startOnLoaded = true;
    </script>

    <!-- This script handles the sound and the fade-out logic -->
    <script src="data/loader.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N64 Emulator</title>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</head>
<body>
    <script>
        // Function to get URL parameters
        function getURLParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)'), results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // Load the game from the URL parameter
        var game = getURLParameter('game');
        if (game) {
            const romLoader = new EmulatorJS.RomLoader();
            romLoader.load(game + '.zip', function(rom) {
                const emulator = new EmulatorJS.N64();
                emulator.loadRom(rom);
                emulator.setFullscreen(true);
                emulator.start();
            });
        } else {
            document.body.innerHTML = '<h1>Please provide a game parameter in the URL.</h1>'; 
        }
    </script>
</body>
</html>

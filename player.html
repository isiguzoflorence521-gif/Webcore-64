<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcore 64 | Playing...</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game-box { width: 100vw; height: 100vh; max-width: 100%; }
    </style>
</head>
<body class="player-body">
    <div id="game-box"></div>

    <!-- Load your custom WASD/Arrow Key config -->
    <script src="config.js"></script>

    <script type="text/javascript">
        // 1. Grab the ROM path from the URL (?game=roms/sm64.z64)
        const urlParams = new URLSearchParams(window.location.search);
        const gamePath = urlParams.get('game');

        if (gamePath) {
            // 2. Setup EmulatorJS to use your renamed 'n64' files
            window.EJS_player = '#game-box';
            window.EJS_core = 'n64';         // This finds 'n64.js' and 'n64.wasm'
            window.EJS_pathtodata = 'data/'; // Points to your GitHub 'data/' folder
            window.EJS_gameUrl = gamePath;   // The .z64 file path
            
            // 3. Apply your custom controls/performance settings
            window.EJS_settings = webcoreConfig; 
            
        } else {
            // Redirect back to menu if no game is selected
            window.location.href = 'index.html';
        }
    </script>
    
    <!-- 4. Load the starter script from your local data folder -->
    <script src="data/loader.js"></script>
</body>
</html>

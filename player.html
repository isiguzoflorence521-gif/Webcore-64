<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcore 64 - N64 Game Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .menu-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            text-align: center;
        }
        
        h1 {
            margin-bottom: 30px;
            color: #ff6b35;
        }
        
        .game-list {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .game-btn {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .game-btn:hover {
            background: #ff4500;
        }
        
        #emulator {
            width: 100%;
            max-height: 90vh;
            background: #000;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .loading {
            text-align: center;
            display: none;
        }
        
        .spinner {
            border: 4px solid #ff6b35;
            border-top: 4px solid transparent;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .controls {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-btn {
            background: #555;
            padding: 10px 20px;
            margin-right: 10px;
        }
        
        .back-btn:hover {
            background: #777;
        }
    </style>
</head>
<body>
    <div id="menuContainer" class="menu-container">
        <h1>🎮 Webcore 64</h1>
        <h2>Select a Game</h2>
        <div class="game-list">
            <button class="game-btn" onclick="loadGame('roms/banjo_kazooie.zip', 'Banjo Kazooie')">
                🎯 Banjo Kazooie
            </button>
            <button class="game-btn" onclick="loadGame('roms/sm64.zip', 'Super Mario 64')">
                ⭐ Super Mario 64
            </button>
            <button class="game-btn" onclick="loadGame('roms/smash_bros.zip', 'Super Smash Bros')">
                🥊 Super Smash Bros
            </button>
        </div>
    </div>
    
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading emulator...</p>
    </div>
    
    <div id="emulator"></div>
    
    <div id="controls" class="controls" style="display: none;">
        <button class="game-btn back-btn" onclick="backToMenu()">Back to Menu</button>
        <button class="game-btn" onclick="toggleFullscreen()">Fullscreen</button>
    </div>

    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    <script>
        let EJS_player = null;
        
        function loadGame(romPath, gameName) {
            document.getElementById('menuContainer').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('controls').style.display = 'block';
            
            setTimeout(() => {
                try {
                    EJS_player = new EJS({
                        element: document.getElementById('emulator'),
                        executableFolder: 'https://cdn.emulatorjs.org/stable/',
                        gameUrl: romPath,
                        core: 'mupen64plus',
                        volume: 1.0,
                        autoplay: true,
                        showPlayButton: true
                    });
                    
                    document.getElementById('emulator').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                } catch (error) {
                    console.error('Error loading game:', error);
                    document.getElementById('loading').style.display = 'none';
                    alert('Failed to load ' + gameName + '. Please try again.');
                    backToMenu();
                }
            }, 500);
        }
        
        function backToMenu() {
            document.getElementById('menuContainer').style.display = 'block';
            document.getElementById('emulator').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            
            if (EJS_player) {
                document.getElementById('emulator').innerHTML = '';
                EJS_player = null;
            }
        }
        
        function toggleFullscreen() {
            if (document.getElementById('emulator').requestFullscreen) {
                document.getElementById('emulator').requestFullscreen();
            }
        }
    </script>
</body>
</html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcore-64 Player</title>
    <!-- Your main styles and performance fixes -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="data/emu-css.css">
    <script src="config.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>

    <div id="game-container"></div>

    <script>
        /// 1. EXTRACT ROM NAME
const params = new URLSearchParams(window.location.search);
const gameFile = params.get('game');

if (!gameFile) {
    alert("No ROM found! Returning to Menu.");
    window.location.href = 'index.html';
}

// 2. ATTACH CONFIG TO WINDOW (Required for loader.js to find them)
window.EJS_player = '#game-container';
window.EJS_core = 'n64';
window.EJS_gameUrl = 'roms/' + gameFile; 
window.EJS_pathtodata = 'data/';         // Must have the trailing slash
window.EJS_startOnLoaded = true;         // Auto-starts once ROM is ready

// 3. OPTIONAL SETTINGS
window.EJS_threads = false;              // Try setting to FALSE if it hangs on a black screen
window.EJS_performance = 'high';

    </script>

    <!-- 4. ENGINE LOADER: The script that starts the WASM engine -->
    <script src="data/loader.js"></script>

</body>

</html>

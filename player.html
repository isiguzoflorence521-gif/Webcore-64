<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcore 64 | Game Player</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
        
        .control-bar {
            position: absolute; bottom: 10px; right: 10px; z-index: 100;
            display: flex; gap: 10px; opacity: 0.3; transition: 0.3s;
        }
        .control-bar:hover { opacity: 1; }
        .btn-tool { 
            background: rgba(255,0,0,0.7); color: white; border: none; 
            padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 12px;
            text-transform: uppercase; font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div class="control-bar">
        <button class="btn-tool" onclick="toggleFullScreen()">Full Screen</button>
        <button class="btn-tool" onclick="window.location.href='index.html'">Main Menu</button>
    </div>

    <!-- Ensure config.js is in your root folder -->
    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gameUrl = urlParams.get('game');

        async function startWebcore() {
            if (!gameUrl) {
                window.location.href = 'index.html';
                return;
            }

            try {
                // 1. Fetch .z64 as Binary Blob to bypass GitHub security
                const response = await fetch(gameUrl);
                if (!response.ok) throw new Error("ROM not found");
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                // 2. EmulatorJS Setup using the Stable CDN
                window.EJS_player = '#game-container';
                window.EJS_core = 'n64'; 
                window.EJS_gameUrl = blobUrl; 
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org';
                
                // 3. Apply your custom arrow-key settings from config.js
                window.EJS_settings = typeof webcoreConfig !== 'undefined' ? webcoreConfig : {};
                
                // 4. Set game name for save files
                window.EJS_gameName = gameUrl.split('/').pop().replace('.z64', '');

                // 5. Inject the Loader Script from CDN
                const loader = document.createElement('script');
                loader.src = 'https://cdn.emulatorjs.orgloader.js';
                document.body.appendChild(loader);

            } catch (err) {
                console.error("Webcore Boot Error:", err);
                window.location.href = '404.html';
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        startWebcore();
    </script>
</body>
</html>

name: Deploy Webcore 64 to Pages

on:
  push:
    branches: ["main"] # Triggers on every push to the main branch
  workflow_dispatch:      # Allows you to run this manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Pulls your code into the runner

      - name: Setup Pages
        uses: actions/configure-pages@v4 # Prepares the Pages environment

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads the entire root directory (index.html, roms, etc.)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Performs the final deployment
